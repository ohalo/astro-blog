<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f5f5"/>
  <text x="400" y="50" font-size="24" text-anchor="middle" font-weight="bold">Limit Order Book Depth</text>
  <rect x="50" y="100" width="300" height="400" fill="#e0e0e0" stroke="black"/>
  <rect x="450" y="100" width="300" height="400" fill="#e0e0e0" stroke="black"/>
  <text x="200" y="80" font-size="18" text-anchor="middle" fill="green">Bid Orders</text>
