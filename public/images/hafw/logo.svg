<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#2563eb"/>
  
  <!-- Circuit/flow pattern - represents the AI-driven workflow pipeline -->
  <!-- Top-left node -->
  <circle cx="160" cy="160" r="36" fill="white" opacity="0.9"/>
  <text x="160" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="36" fill="#2563eb">需</text>
  
  <!-- Top-right node -->
  <circle cx="352" cy="160" r="36" fill="white" opacity="0.9"/>
  <text x="352" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="36" fill="#2563eb">设</text>
  
  <!-- Bottom-center node -->
  <circle cx="256" cy="320" r="36" fill="white" opacity="0.9"/>
  <text x="256" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="36" fill="#2563eb">码</text>
  
  <!-- Connecting lines with flow arrows -->
  <line x1="196" y1="160" x2="316" y2="160" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="180" y1="193" x2="236" y2="287" stroke="white" stroke-width="4" opacity="0.7"/>
  <line x1="332" y1="193" x2="276" y2="287" stroke="white" stroke-width="4" opacity="0.7"/>
  
  <!-- Arrow tips -->
  <polygon points="312,150 324,160 312,170" fill="white" opacity="0.7"/>
  <polygon points="230,280 240,294 226,294" fill="white" opacity="0.7"/>
  <polygon points="282,280 272,294 286,294" fill="white" opacity="0.7"/>
  
  <!-- AI sparkle indicators -->
  <circle cx="256" cy="130" r="5" fill="#06b6d4" opacity="0.9"/>
  <circle cx="140" cy="250" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="372" cy="250" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="256" cy="400" r="5" fill="#06b6d4" opacity="0.9"/>
  
  <!-- HAFW text at bottom -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="48" fill="white" letter-spacing="8">HAFW</text>
</svg>