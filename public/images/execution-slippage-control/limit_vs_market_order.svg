<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#555"/>
    </marker>
    <style>
      .title { font: bold 24px sans-serif; fill: #333; }
      .subtitle { font: 16px sans-serif; fill: #555; }
      .label { font: 14px sans-serif; fill: #333; }
      .small-text { font: 12px sans-serif; fill: #666; }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="1000" height="700" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="500" y="40" class="title" text-anchor="middle">限价单与市价单执行对比</text>
  
  <!-- 左半部分：限价单 -->
  <rect x="50" y="80" width="400" height="520" fill="white" stroke="#4A90E2" stroke-width="3" rx="10"/>
  <text x="250" y="120" font-size="22" font-weight="bold" text-anchor="middle" fill="#4A90E2">限价单 (Limit Order)</text>
  
  <!-- 限价单特点 -->
  <circle cx="80" cy="160" r="6" fill="#50C878"/>
  <text x="100" y="165" class="label">指定价格，等待成交</text>
  
  <circle cx="80" cy="190" r="6" fill="#50C878"/>
  <text x="100" y="195" class="label">可控制滑点，但可能不成交</text>
  
  <circle cx="80" cy="220" r="6" fill="#50C878"/>
  <text x="100" y="225" class="label">适合非紧急、大单交易</text>
  
  <circle cx="80" cy="250" r="6" fill="#50C878"/>
  <text x="100" y="255" class="label">提供流动性，手续费较低</text>
  
  <!-- 限价单执行示意图 -->
  <rect x="100" y="280" width="300" height="200" fill="#F0F8FF" stroke="#4A90E2" stroke-width="2" rx="5"/>
  <text x="250" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">订单簿示意图</text>
  
  <!-- 卖单档位 -->
  <text x="120" y="340" class="small-text" fill="#FF6B6B">卖五: 10.05 (500股)</text>
  <text x="120" y="365" class="small-text" fill="#FF6B6B">卖四: 10.04 (800股)</text>
  <text x="120" y="390" class="small-text" fill="#FF6B6B">卖三: 10.03 (600股)</text>
  <text x="120" y="415" class="small-text" fill="#FF6B6B">卖二: 10.02 (700股)</text>
  <text x="120" y="440" class="small-text" fill="#FF6B6B" font-weight="bold">卖一: 10.01 (400股)</text>
  
  <!-- 买单档位 -->
  <text x="120" y="470" class="small-text" fill="#50C878" font-weight="bold">买一: 10.00 (500股)</text>
  <text x="120" y="495" class="small-text" fill="#50C878">买二: 9.99 (800股)</text>
  <text x="120" y="520" class="small-text" fill="#50C878">买三: 9.98 (600股)</text>
  
  <!-- 限价买单示例 -->
  <rect x="450" y="350" width="120" height="40" fill="#50C878" rx="5" opacity="0.8"/>
  <text x="510" y="375" font-size="14" fill="white" text-anchor="middle" font-weight="bold">限价买单</text>
  <text x="510" y="393" font-size="12" fill="white" text-anchor="middle">价格: 10.00</text>
  
  <line x1="450" y1="370" x2="350" y2="465" stroke="#333" stroke-width="2" 
        marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- 右半部分：市价单 -->
  <rect x="550" y="80" width="400" height="520" fill="white" stroke="#FF6B6B" stroke-width="3" rx="10"/>
  <text x="750" y="120" font-size="22" font-weight="bold" text-anchor="middle" fill="#FF6B6B">市价单 (Market Order)</text>
  
  <!-- 市价单特点 -->
  <circle cx="580" cy="160" r="6" fill="#FF6B6B"/>
  <text x="600" y="165" class="label">立即成交，不指定价格</text>
  
  <circle cx="580" cy="190" r="6" fill="#FF6B6B"/>
  <text x="600" y="195" class="label">保证成交，但面临滑点风险</text>
  
  <circle cx="580" cy="220" r="6" fill="#FF6B6B"/>
  <text x="600" y="225" class="label">适合紧急、小单交易</text>
  
  <circle cx="580" cy="250" r="6" fill="#FF6B6B"/>
  <text x="600" y="255" class="label">消耗流动性，手续费较高</text>
  
  <!-- 市价单执行示意图 -->
  <rect x="600" y="280" width="300" height="200" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="2" rx="5"/>
  <text x="750" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">成交价格模拟</text>
  
  <!-- 成交过程 -->
  <text x="620" y="345" class="small-text">步骤1: 以10.01成交400股</text>
  <rect x="620" y="355" width="260" height="20" fill="#FFE4E1" stroke="#FF6B6B" stroke-width="1"/>
  <rect x="620" y="355" width="104" height="20" fill="#FF6B6B" opacity="0.6"/>
  <text x="750" y="370" font-size="10" fill="#333" text-anchor="middle">400/1000股</text>
  
  <text x="620" y="395" class="small-text">步骤2: 以10.02成交700股</text>
  <rect x="620" y="405" width="260" height="20" fill="#FFE4E1" stroke="#FF6B6B" stroke-width="1"/>
  <rect x="620" y="405" width="182" height="20" fill="#FF6B6B" opacity="0.6"/>
  <text x="750" y="420" font-size="10" fill="#333" text-anchor="middle">700/1000股 (累计1100)</text>
  
  <text x="620" y="445" class="small-text" font-weight="bold">平均成交价: 10.016</text>
  <text x="620" y="470" class="small-text" fill="#FF6B6B">滑点: +0.6个基点 (相对中间价10.005)</text>
  
  <!-- 市价卖单示例 -->
  <rect x="50" y="350" width="120" height="40" fill="#FF6B6B" rx="5" opacity="0.8"/>
  <text x="110" y="375" font-size="14" fill="white" text-anchor="middle" font-weight="bold">市价卖单</text>
  <text x="110" y="393" font-size="12" fill="white" text-anchor="middle">数量: 1000股</text>
  
  <line x1="170" y1="370" x2="270" y2="465" stroke="#333" stroke-width="2" 
        marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- 底部总结 -->
  <rect x="50" y="620" width="900" height="60" fill="#E8F4FD" stroke="#4A90E2" stroke-width="2" rx="5"/>
  <text x="500" y="645" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">选择原则：紧急交易用市价单，控制成本用限价单</text>
  <text x="500" y="670" font-size="13" text-anchor="middle" fill="#555">优化策略：根据市场波动、订单大小、时间紧迫度动态调整</text>
</svg>